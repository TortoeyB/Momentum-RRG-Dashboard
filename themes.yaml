# =============================================================
# themes.yaml — โครงสร้างธีมของ dashboard
# แก้ไฟล์นี้เพื่อเพิ่ม/ลดธีม, ETF หรือหุ้นรายตัวได้เลย
#
# โครงสร้างแต่ละธีม:
#   - name:    ชื่อธีมที่แสดงบน dashboard
#     etfs:    ETF ตัวแทน (ตัวแรกใช้เป็น "ราคาอ้างอิง" ของธีม
#              สำหรับ price action / แท่งเทียน)
#     stocks:  หุ้นรายตัว — คะแนนธีม = ค่าเฉลี่ยแบบ equal-weight
#              ของหุ้นเหล่านี้ (ถ้าไม่มี stocks จะใช้ ETF แทน)
# =============================================================

